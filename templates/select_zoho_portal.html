{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8">Select Zoho Portal</h1>

    <form method="POST" action="{{ url_for('select_zoho_portal') }}" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="portal_id">
                Zoho Portal
            </label>
            <select name="portal_id" id="portal_id" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                {% for portal in portals %}
                <option value="{{ portal.id }}">{{ portal.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex items-center justify-between">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
                Select Portal
            </button>
        </div>
    </form>
</div>
{% endblock %}
