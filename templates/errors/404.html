{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-r from-primary to-secondary flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl text-center">
        <div>
            <h1 class="text-5xl font-bold text-gray-800 mb-6">404</h1>
            <h2 class="text-2xl font-semibold text-gray-700 mb-4">Page Not Found</h2>
            <p class="text-gray-600 mb-8">The page you are looking for does not exist or has been moved.</p>
            <a href="{{ url_for('dashboard') }}" class="bg-primary hover:bg-secondary text-white font-bold py-3 px-6 rounded-full transition duration-300 inline-block">
                Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
