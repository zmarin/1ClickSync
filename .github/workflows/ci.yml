name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://oneclicksync:testpass@localhost:5432/oneclicksync_test
      REDIS_URL: redis://localhost:6379
      ZOHO_CLIENT_ID: smoke-client-id
      ZOHO_CLIENT_SECRET: smoke-client-secret
      ZOHO_REDIRECT_URI: http://localhost:3000/api/zoho/callback
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      SESSION_SECRET: smoke-session-secret
      JWT_SECRET: smoke-jwt-secret-12345
      APP_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oneclicksync_test
          POSTGRES_USER: oneclicksync
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: psql -v ON_ERROR_STOP=1 -f scripts/init.sql
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: oneclicksync
          PGPASSWORD: testpass
          PGDATABASE: oneclicksync_test

      - name: Run migrations
        run: npm run db:migrate

      - name: TypeScript build
        run: npm run build

      - name: Smoke test
        run: npm run test:smoke
